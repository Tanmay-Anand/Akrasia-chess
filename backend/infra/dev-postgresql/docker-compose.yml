services:
  postgres:
    image: postgres:17-alpine
    container_name: praxis-chess-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: praxis_chess_user
      POSTGRES_PASSWORD: praxis_chess_pass
      POSTGRES_DB: praxis_chess
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis_chess_user -d praxis_chess"]
      interval: 10s
      timeout: 5s
      retries: 5
